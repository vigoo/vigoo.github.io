{% extends "index.html" %}
{% block main %}
<header>
    <h1>Tags</h1>
</header>

<ul class="tag-list">
    {% for term in terms %}
    <li>
        {% set scale = 100 + ((term.page_count - 1) * 6) %}
        <span class="post-tag" style="font-size: {{ scale }}%">
            <a href="{{ term.permalink }}">{{ term.name }} <sup>{{ term.page_count }}</sup></a>
        </span>
    </li>
    {% endfor %}
</ul>
{% endblock %}
