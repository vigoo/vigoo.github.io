    <script>
    document.addEventListener("DOMContentLoaded", function () {
        var langNames = {
            "typescript": "TypeScript", "ts": "TypeScript",
            "rust": "Rust",
            "scala": "Scala",
            "moonbit": "MoonBit", "MoonBit": "MoonBit"
        };
        var allTabs = [];
        document.querySelectorAll(".code-tabs").forEach(function (tabs) {
            var blocks = tabs.querySelectorAll("pre");
            if (blocks.length === 0) return;
            var nav = document.createElement("div");
            nav.className = "code-tabs-nav";
            var langs = [];
            blocks.forEach(function(pre, i) {
                var code = pre.querySelector("code");
                var lang = code ? (code.getAttribute("data-lang") || "") : "";
                langs.push(lang);
                var label = langNames[lang] || lang || ("Tab " + (i + 1));
                var btn = document.createElement("button");
                btn.className = "code-tab-btn" + (i === 0 ? " active" : "");
                btn.setAttribute("data-lang", lang);
                btn.textContent = label;
                nav.appendChild(btn);
                pre.style.display = i === 0 ? "" : "none";
            });
            tabs.insertBefore(nav, tabs.firstChild);
            allTabs.push({ nav: nav, blocks: blocks, langs: langs });
        });
        function activateLang(lang) {
            allTabs.forEach(function(t) {
                var found = t.langs.indexOf(lang);
                if (found === -1) return;
                t.nav.querySelectorAll(".code-tab-btn").forEach(function(b) { b.classList.remove("active"); });
                t.nav.querySelector('.code-tab-btn[data-lang="' + lang + '"]').classList.add("active");
                t.blocks.forEach(function(pre, i) { pre.style.display = i === found ? "" : "none"; });
            });
        }
        allTabs.forEach(function(t) {
            t.nav.addEventListener("click", function(e) {
                if (e.target.tagName !== "BUTTON") return;
                activateLang(e.target.getAttribute("data-lang"));
            });
        });
    });
    </script>
